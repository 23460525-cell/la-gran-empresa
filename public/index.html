<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Gran Empresa - Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; display: flex; }
        nav { background: #333; color: white; width: 250px; height: 100vh; padding: 20px; }
        nav h3 { color: #4CAF50; }
        nav button { display: block; width: 100%; margin: 10px 0; padding: 10px; cursor: pointer; background: #555; color: white; border: none; text-align: left; }
        nav button:hover { background: #4CAF50; }
        main { padding: 20px; flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <nav>
        <h3>Catálogos</h3>
        <button onclick="cargarModulo('conceptos')">Conceptos</button>
        <button onclick="cargarModulo('destinos')">Destinos</button>
        <button onclick="cargarModulo('productos')">Productos</button>
        <button onclick="cargarModulo('unidades')">Unidades de Medida</button>
        
        <h3>Documentos</h3>
        <button onclick="mostrarMensaje('Interfaz de Entradas en construcción')">Entradas</button>
        <button onclick="mostrarMensaje('Interfaz de Salidas en construcción')">Salidas</button>
    </nav>

    <main id="app-content">
        <h2>Bienvenido al Dashboard de La Gran Empresa</h2>
        <p>Selecciona una opción del menú.</p>
    </main>

    <script src="app.js"></script>
</body>
</html>
